name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: iffy/install-nim@v5
        with:
          version: "2.0.8"

      - name: Build VM
        run: make vm

      - name: Build Assembler
        run: make asm

      - name: Run tests
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C code with -Wall -Wextra
        run: make vm CFLAGS="-Wall -Wextra -pedantic -std=c99 -Werror"
